<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grafik Konsultacji — Kardiologia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-m:#378ADD;
  --red:#E24B4A;--red-l:#FCEBEB;
  --green:#3B6D11;--green-l:#EAF3DE;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --gray:#F7F6F2;--gray-we:#EFEDE6;--gray-hol:#FAECE7;
  --bd:#E2DDD6;--bd-l:#EDE9E3;
  --tx:#1A1917;--tx2:#6B6760;--tx3:#A09C97;
  --sw:272px;--r:7px;--rs:5px;
}
body{font-family:Georgia,serif;background:var(--gray);color:var(--tx);height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:var(--sw) 1fr;height:100vh}

/* SIDEBAR */
.sidebar{background:#fff;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto}
.sb-hdr{display:flex;align-items:center;gap:10px;padding:16px 14px 12px;border-bottom:1px solid var(--bd-l)}
.sb-logo{width:34px;height:34px;background:var(--blue);color:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}
.sb-title{font-size:14px;font-weight:700;color:var(--tx)}
.sb-sub{font-size:11px;color:var(--tx3);font-style:italic}
.sb-sec{padding:12px 14px;border-bottom:1px solid var(--bd-l)}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:8px}
.start-info{font-size:11px;color:var(--tx2);background:var(--gray);border:1px solid var(--bd-l);border-radius:var(--rs);padding:6px 8px;margin-bottom:8px;line-height:1.7}
.start-info strong{color:var(--tx)}
.doc-item{display:flex;align-items:center;gap:7px;padding:5px 7px;border:1px solid var(--bd-l);border-radius:var(--rs);background:#fff;margin-bottom:4px;cursor:grab;transition:box-shadow .15s,border-color .15s;user-select:none}
.doc-item:hover{border-color:var(--bd);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.doc-item.dragging{opacity:.4}
.doc-item.drag-over{border-color:var(--blue-m);background:var(--blue-l)}
.drag-h{color:var(--tx3);font-size:12px;flex-shrink:0;line-height:1;cursor:grab}
.d-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.d-nm{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-pos{font-size:10px;color:var(--tx3);flex-shrink:0}
.btn-rm{width:20px;height:20px;border-radius:3px;border:1px solid transparent;background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;flex-shrink:0}
.btn-rm:hover{background:var(--red-l);color:var(--red);border-color:var(--red)}
.add-row{display:flex;gap:5px;margin-top:7px}
.add-row input,.hol-add input[type=date]{flex:1;padding:5px 8px;border:1px solid var(--bd);border-radius:var(--rs);font-size:12px;font-family:inherit;color:var(--tx);background:var(--gray);transition:border-color .15s}
.add-row input:focus,.hol-add input[type=date]:focus{outline:none;border-color:var(--blue-m);background:#fff}
.btn-add{width:28px;height:28px;border-radius:var(--rs);border:none;background:var(--blue);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;line-height:1;transition:filter .15s}
.btn-add:hover{filter:brightness(1.1)}
.hol-add{display:flex;gap:5px;align-items:center}
.btn-sm{padding:5px 9px;border-radius:var(--rs);border:1px solid var(--bd);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;color:var(--tx);transition:background .15s;white-space:nowrap}
.btn-sm:hover{background:var(--gray)}
.hol-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.chip{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;background:var(--gray-hol);font-size:11px;color:#993C1D}
.chip button{background:none;border:none;cursor:pointer;color:#993C1D;font-size:12px;line-height:1;padding:0 1px}
.sb-legend{display:flex;flex-direction:column;gap:6px}
.leg-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--tx2)}
.leg-dot{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.leg-chip{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--green-l);color:var(--green);font-weight:700;letter-spacing:.04em}
.sb-foot{margin-top:auto;padding:12px 14px;border-top:1px solid var(--bd-l)}
.btn-pdf{width:100%;padding:8px 12px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:filter .15s}
.btn-pdf:hover{filter:brightness(1.1)}
.btn-pdf svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;flex-shrink:0}
.pdf-hint{font-size:10px;color:var(--tx3);text-align:center;margin-top:4px;font-style:italic}

/* MAIN */
.main{display:flex;flex-direction:column;padding:18px 20px;overflow-y:auto;gap:12px}
.cal-hdr{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cal-nav{display:flex;align-items:center;gap:7px}
.nav-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:#fff;font-size:17px;cursor:pointer;color:var(--tx);display:flex;align-items:center;justify-content:center;transition:background .15s}
.nav-btn:hover{background:var(--gray)}
.month-lbl{font-size:17px;font-weight:700;min-width:170px;text-align:center;color:var(--tx)}
.hdr-acts{margin-left:auto;display:flex;gap:7px;align-items:center}
.btn-today{padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:#fff;font-size:12px;font-family:inherit;cursor:pointer;color:var(--tx);transition:background .15s}
.btn-today:hover{background:var(--gray)}
.btn-abs{padding:5px 12px;border-radius:6px;border:1px solid var(--amber);background:var(--amber-l);color:var(--amber);font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn-abs:hover{background:#f0d9b8}
.btn-abs.active{background:var(--amber);color:#fff}
.btn-abs svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* ABSENCE BAR */
.abs-bar{background:var(--red-l);border:1px solid #f0b8b8;border-radius:var(--r);padding:9px 12px;display:none;align-items:center;gap:9px;flex-wrap:wrap}
.abs-bar.active{display:flex}
.abs-bar-l{display:flex;align-items:center;gap:9px;flex-wrap:wrap;flex:1}
.abs-bar-r{display:flex;align-items:center;gap:5px}
.abs-lbl{font-size:12px;color:#A32D2D;font-weight:600;white-space:nowrap}
.abs-bar select{padding:4px 7px;border-radius:var(--rs);border:1px solid #f0b8b8;font-size:12px;font-family:inherit;background:#fff;color:var(--tx);cursor:pointer}
.picked-ct{font-size:12px;color:#A32D2D;font-weight:600}
.btn-apply{padding:4px 11px;border-radius:var(--rs);background:var(--red);color:#fff;border:none;font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:4px;transition:filter .15s}
.btn-apply:hover:not(:disabled){filter:brightness(1.1)}
.btn-apply:disabled{opacity:.5;cursor:not-allowed}
.btn-apply svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5}
.btn-clr{padding:4px 9px;border-radius:var(--rs);border:1px solid #f0b8b8;background:#fff;font-size:12px;font-family:inherit;cursor:pointer;color:#A32D2D;transition:background .15s}
.btn-clr:hover{background:var(--red-l)}

/* CALENDAR */
.cal-wrap{background:#fff;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.grid7{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-hdr-row{background:var(--gray);border-bottom:1px solid var(--bd)}
.dh{text-align:center;font-size:10px;font-weight:700;color:var(--tx2);padding:7px 4px;letter-spacing:.05em;text-transform:uppercase}
.dh.we{color:var(--tx3)}
.dc{border-right:1px solid var(--bd-l);border-bottom:1px solid var(--bd-l);min-height:72px;padding:5px 5px 4px;position:relative;transition:background .1s}
.dc:nth-child(7n){border-right:none}
.dc.wk{cursor:pointer}.dc.wk:hover{background:#FAFAF8}
.dc.we{background:var(--gray-we);cursor:default}.dc.we .dn{color:var(--tx3)}
.dc.hd{background:var(--gray-hol);cursor:default}.dc.hd .dn{color:#D85A30}
.dc.emp{cursor:default;border-color:transparent}
.dc.tod{outline:2px solid var(--blue-m);outline-offset:-2px}
.dc.sel{background:var(--blue-l)}
.dc.pm.wk{cursor:crosshair}.dc.pm.wk:hover{background:var(--amber-l)}
.dc.picked{background:var(--amber-l)!important;outline:2px solid var(--amber);outline-offset:-2px}
.dc.picked .dn{color:var(--amber)}
.dn{font-size:11px;font-weight:700;line-height:1;margin-bottom:3px;color:var(--tx)}
.dtag{font-size:10px;border-radius:3px;padding:2px 4px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;line-height:1.35}
.pick-ind{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:var(--amber);color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.pre-tag{font-size:9px;color:var(--tx3);font-style:italic;margin-top:3px}

/* DETAIL */
.detail{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px}
.det-empty{color:var(--tx3);font-size:13px;font-style:italic}
.det-date{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--tx)}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.det-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bd-l);font-size:13px}
.det-row:last-child{border-bottom:none}
.det-lbl{font-size:11px;color:var(--tx3);width:75px;flex-shrink:0}
.prs-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:7px}
.pr-item{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:var(--rs);border:1px solid var(--bd-l);margin-bottom:4px;background:var(--gray)}
.pr-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.pr-nm{font-size:12px;flex:1}
.pr-st{font-size:11px;font-weight:600}
.pr-st.ok{color:var(--green)}.pr-st.no{color:var(--red)}
.tog{width:32px;height:18px;border-radius:9px;border:1px solid var(--bd);background:var(--gray);cursor:pointer;position:relative;transition:background .18s,border-color .18s;flex-shrink:0}
.tog.on{background:var(--blue);border-color:var(--blue)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .18s}
.tog.on::after{transform:translateX(14px)}
.badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.04em}
.b-green{background:var(--green-l);color:var(--green)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-hdr">
    <div class="sb-logo">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </div>
    <div><div class="sb-title">Kardiologia</div><div class="sb-sub">Grafik konsultacji</div></div>
  </div>

  <div class="sb-sec">
    <div class="sec-lbl">Lista lekarzy</div>
    <div class="start-info" id="si"></div>
    <div id="dl"></div>
    <div class="add-row">
      <input type="text" id="di" placeholder="Imię i nazwisko..." maxlength="50"/>
      <button class="btn-add" onclick="addDoc()" title="Dodaj">+</button>
    </div>
  </div>

  <div class="sb-sec">
    <div class="sec-lbl">Dni wolne / Święta</div>
    <div class="hol-add">
      <input type="date" id="hi"/>
      <button class="btn-sm" onclick="addHol()">Dodaj</button>
    </div>
    <div id="hc" class="hol-chips"></div>
  </div>

  <div class="sb-sec sb-legend">
    <div class="sec-lbl">Legenda</div>
    <div class="leg-row"><span class="leg-dot" style="background:#E6F1FB;border:1px solid #C0D8F0"></span>kolor = lekarz konsultujący</div>
    <div class="leg-row"><span class="leg-chip">ZALEGŁY</span>zaległy dzień konsultacyjny</div>
  </div>

  <div class="sb-foot">
    <button class="btn-pdf" onclick="genPDF()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Pobierz grafik PDF
    </button>
    <div class="pdf-hint">pobiera plik PDF do dysku</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="cal-hdr">
    <div class="cal-nav">
      <button class="nav-btn" onclick="prevM()">&#8249;</button>
      <h1 class="month-lbl" id="ml"></h1>
      <button class="nav-btn" onclick="nextM()">&#8250;</button>
    </div>
    <div class="hdr-acts">
      <button class="btn-today" onclick="goToday()">Dziś</button>
      <button class="btn-abs" id="abt" onclick="toggleAbs()">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        Zaznacz nieobecności
      </button>
    </div>
  </div>

  <div class="abs-bar" id="ab">
    <div class="abs-bar-l">
      <span class="abs-lbl">Tryb nieobecności:</span>
      <select id="as"><option value="">— wybierz lekarza —</option></select>
      <span class="picked-ct" id="pc">0 dni zaznaczonych</span>
    </div>
    <div class="abs-bar-r">
      <button class="btn-apply" id="apb" onclick="applyAbs()" disabled>
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Zastosuj
      </button>
      <button class="btn-clr" onclick="clearPicked()">Wyczyść</button>
      <button class="btn-clr" onclick="toggleAbs()">Wyjdź</button>
    </div>
  </div>

  <div class="cal-wrap">
    <div class="grid7 cal-hdr-row">
      <div class="dh">Pon</div><div class="dh">Wt</div><div class="dh">Śr</div>
      <div class="dh">Czw</div><div class="dh">Pt</div>
      <div class="dh we">Sob</div><div class="dh we">Nd</div>
    </div>
    <div class="grid7" id="cal"></div>
  </div>

  <div class="detail" id="det"><div class="det-empty">Kliknij dzień roboczy, aby zobaczyć szczegóły i oznaczyć obecność.</div></div>
</main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
/* ===================== DATA ===================== */
const COLS=[
  {bg:'#E6F1FB',tx:'#0C447C',pr:[230,241,251],pt:[12,95,165]},
  {bg:'#EAF3DE',tx:'#27500A',pr:[234,243,222],pt:[39,80,10]},
  {bg:'#FAEEDA',tx:'#633806',pr:[250,238,218],pt:[99,56,6]},
  {bg:'#FBEAF0',tx:'#72243E',pr:[251,234,240],pt:[114,36,62]},
  {bg:'#EEEDFE',tx:'#3C3489',pr:[238,237,254],pt:[60,52,137]},
  {bg:'#E1F5EE',tx:'#085041',pr:[225,245,238],pt:[8,80,65]},
  {bg:'#FCEBEB',tx:'#791F1F',pr:[252,235,235],pt:[121,31,31]},
  {bg:'#F1EFE8',tx:'#444441',pr:[241,239,232],pt:[68,68,65]},
];
let docs=[],hols=[],pres={},selDate=null,vY,vM,absMode=false,picked=[];
const tod=new Date();tod.setHours(0,0,0,0);
vY=tod.getFullYear();vM=tod.getMonth();

/* ===================== HELPERS ===================== */
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function isWE(d){const w=d.getDay();return w===0||w===6;}
function isHol(s){return hols.includes(s);}
function isWork(s){return !isWE(pd(s))&&!isHol(s);}
function dcol(n){const i=docs.indexOf(n);return i<0?COLS[7]:COLS[i%COLS.length];}
function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}

/* ===================== PRESENCE ===================== */
function syncDay(s){
  if(!pres[s])pres[s]={};
  const cur=new Set(docs);
  for(const d of Object.keys(pres[s]))if(!cur.has(d))delete pres[s][d];
  for(const d of docs)if(pres[s][d]===undefined)pres[s][d]=true;
}
function syncAll(){for(const s of Object.keys(pres))syncDay(s);if(selDate)syncDay(selDate);}

/* ===================== START DATE ===================== */
function getStart(){
  const c=new Date(tod);
  for(let i=0;i<7;i++){if(isWork(ds(c)))return ds(c);c.setDate(c.getDate()-1);}
  return ds(tod);
}
function wdFrom(a,b){
  const arr=[],cur=pd(a),end=pd(b);
  while(cur<=end){const s=ds(cur);if(isWork(s))arr.push(s);cur.setDate(cur.getDate()+1);}
  return arr;
}

/* ===================== ROTATION ===================== */
function computeAll(upTo){
  if(!docs.length)return{};
  const st=getStart();
  if(upTo<st)return{};
  const wds=wdFrom(st,upTo),n=docs.length;
  const Q=[...docs],debt={};
  docs.forEach(d=>{debt[d]=0;});
  const res={};
  for(let i=0;i<wds.length;i++){
    const day=wds[i];syncDay(day);
    const dp=pres[day];
    let mkIdx=-1;
    for(let mi=0;mi<Q.length;mi++){if(debt[Q[mi]]>0&&dp[Q[mi]]!==false){mkIdx=mi;break;}}
    const abDbt=docs.some(d=>debt[d]>0&&dp[d]===false);
    const front=Q[0],fOk=dp[front]!==false;
    if(mkIdx>=0&&!abDbt){
      const mk=Q[mkIdx];debt[mk]--;Q.splice(mkIdx,1);Q.push(mk);
      res[day]={who:mk,type:'makeup'};
    }else if(!fOk){
      debt[front]++;Q.shift();Q.push(front);
      let bk=null;
      for(let bi=0;bi<Q.length;bi++){if(dp[Q[bi]]!==false){bk=Q[bi];Q.splice(bi,1);Q.push(bk);break;}}
      res[day]={who:bk||null,type:'normal'};
    }else{
      Q.shift();Q.push(front);
      res[day]={who:front,type:'normal'};
    }
    if(day===upTo)break;
  }
  return res;
}
function mData(y,m){
  const last=new Date(y,m+1,0).getDate();
  const all=computeAll(ds(new Date(y,m,last)));
  const data={};
  for(let i=1;i<=last;i++){const s=ds(new Date(y,m,i));if(isWork(s)&&all[s])data[s]=all[s];}
  return data;
}
function gDay(s){if(!isWork(s)||!docs.length)return null;return computeAll(s)[s]||null;}

/* ===================== START INFO ===================== */
function updSI(){
  const el=document.getElementById('si');
  if(!docs.length){el.innerHTML='<em>Brak lekarzy na liście.</em>';return;}
  const st=getStart(),d=pd(st);
  const lbl=d.toLocaleDateString('pl-PL',{weekday:'long',day:'numeric',month:'long'});
  el.innerHTML='Start rotacji: <strong>'+lbl+'</strong><br>'+
    docs.map((doc,i)=>{const c=COLS[i%COLS.length];return`<span style="display:inline-block;margin:2px 1px 0;padding:1px 6px;border-radius:10px;background:${c.bg};color:${c.tx};font-size:10px">${i+1}. ${doc}</span>`;}).join('');
}

/* ===================== ABSENCE MODE ===================== */
function toggleAbs(){
  absMode=!absMode;picked=[];
  document.getElementById('ab').classList.toggle('active',absMode);
  document.getElementById('abt').classList.toggle('active',absMode);
  if(absMode)refAbsSel();
  updCount();renderCal();
}
function refAbsSel(){
  const sel=document.getElementById('as'),cur=sel.value;
  sel.innerHTML='<option value="">— wybierz lekarza —</option>';
  docs.forEach(doc=>{const o=document.createElement('option');o.value=doc;o.textContent=doc;if(doc===cur)o.selected=true;sel.appendChild(o);});
}
document.getElementById('as').addEventListener('change',updCount);
function togglePick(s){
  if(!absMode||!isWork(s))return;
  const idx=picked.indexOf(s);
  if(idx>=0)picked.splice(idx,1);else picked.push(s);
  updCount();renderCal();
}
function updCount(){
  const n=picked.length;
  document.getElementById('pc').textContent=n+(n===1?' dzień zaznaczony':' dni zaznaczonych');
  document.getElementById('apb').disabled=(n===0||!document.getElementById('as').value);
}
function applyAbs(){
  const doc=document.getElementById('as').value;
  if(!doc||!picked.length)return;
  picked.forEach(s=>{syncDay(s);pres[s][doc]=false;});
  const n=picked.length;picked=[];updCount();renderCal();
  if(selDate)renderDetail(selDate);
  showMsg('Zapisano '+n+' dni nieobecności dla '+doc);
}
function clearPicked(){picked=[];updCount();renderCal();}
function showMsg(txt){
  const bar=document.getElementById('ab');
  const m=document.createElement('span');
  m.style.cssText='font-size:12px;color:#3B6D11;font-weight:600;margin-left:6px';
  m.textContent='✓ '+txt;bar.appendChild(m);
  setTimeout(()=>{try{bar.removeChild(m);}catch(e){}},3000);
}

/* ===================== DOCTORS ===================== */
function renderDocs(){
  const el=document.getElementById('dl');el.innerHTML='';
  docs.forEach((doc,i)=>{
    const c=COLS[i%COLS.length];
    const div=document.createElement('div');div.className='doc-item';div.draggable=true;
    div.innerHTML=`<span class="drag-h">⠿</span><div class="d-av" style="background:${c.bg};color:${c.tx}">${ini(doc)}</div><span class="d-nm">${doc}</span><span class="d-pos">#${i+1}</span><button class="btn-rm" onclick="rmDoc(${i})" title="Usuń">✕</button>`;
    div.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',i);div.classList.add('dragging');});
    div.addEventListener('dragend',()=>div.classList.remove('dragging'));
    div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over');});
    div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
    div.addEventListener('drop',e=>{
      e.preventDefault();div.classList.remove('drag-over');
      const from=parseInt(e.dataTransfer.getData('text/plain'));
      if(from===i)return;
      const mv=docs.splice(from,1)[0];docs.splice(i,0,mv);onChange();
    });
    el.appendChild(div);
  });
  updSI();
}
function onChange(){syncAll();renderDocs();renderCal();if(selDate)renderDetail(selDate);if(absMode)refAbsSel();}
function addDoc(){const inp=document.getElementById('di');const n=inp.value.trim();if(!n)return;docs.push(n);inp.value='';onChange();}
function rmDoc(i){docs.splice(i,1);onChange();}
document.getElementById('di').addEventListener('keydown',e=>{if(e.key==='Enter')addDoc();});

/* ===================== HOLIDAYS ===================== */
function addHol(){const inp=document.getElementById('hi');const v=inp.value;if(!v||hols.includes(v))return;hols.push(v);hols.sort();inp.value='';renderHols();renderCal();if(selDate)renderDetail(selDate);}
function rmHol(s){hols=hols.filter(h=>h!==s);renderHols();renderCal();if(selDate)renderDetail(selDate);}
function renderHols(){
  const el=document.getElementById('hc');el.innerHTML='';
  hols.forEach(s=>{
    const d=pd(s),lbl=d.toLocaleDateString('pl-PL',{day:'numeric',month:'short'});
    const c=document.createElement('div');c.className='chip';
    c.innerHTML=`${lbl} <button onclick="rmHol('${s}')" title="Usuń">✕</button>`;
    el.appendChild(c);
  });
}

/* ===================== CALENDAR ===================== */
function renderCal(){
  const data=mData(vY,vM),el=document.getElementById('cal');
  const todS=ds(tod),st=getStart();
  document.getElementById('ml').textContent=new Date(vY,vM,1).toLocaleDateString('pl-PL',{month:'long',year:'numeric'});
  el.innerHTML='';
  const first=(new Date(vY,vM,1).getDay()+6)%7;
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='dc emp';el.appendChild(e);}
  const last=new Date(vY,vM+1,0).getDate();
  for(let day=1;day<=last;day++){
    (function(day){
      const s=ds(new Date(vY,vM,day)),d=pd(s);
      const cell=document.createElement('div');cell.className='dc';
      if(isWE(d))cell.classList.add('we');
      else if(isHol(s))cell.classList.add('hd');
      else cell.classList.add('wk');
      if(absMode)cell.classList.add('pm');
      if(s===todS)cell.classList.add('tod');
      const isPicked=picked.includes(s);
      if(isPicked)cell.classList.add('picked');
      else if(!absMode&&s===selDate)cell.classList.add('sel');
      const dn=document.createElement('div');dn.className='dn';dn.textContent=day;cell.appendChild(dn);
      if(isPicked){const p=document.createElement('div');p.className='pick-ind';p.textContent='✓';cell.appendChild(p);}
      if(isHol(s)){
        const t=document.createElement('div');t.className='dtag';
        t.style.cssText='background:#FAECE7;color:#993C1D;font-size:9px;font-style:italic';
        t.textContent='Dzień wolny';cell.appendChild(t);
      }else if(!isWE(d)){
        if(s<st){const tg=document.createElement('div');tg.className='pre-tag';tg.textContent='przed startem';cell.appendChild(tg);}
        else{
          const info=data[s];
          if(info&&info.who){
            const c=dcol(info.who);
            const t1=document.createElement('div');t1.className='dtag';
            t1.style.cssText='background:'+c.bg+';color:'+c.tx+';font-weight:600';
            t1.textContent=info.who;cell.appendChild(t1);
            if(info.type==='makeup'){
              const t2=document.createElement('div');t2.className='dtag';
              t2.style.cssText='background:#EAF3DE;color:#3B6D11;font-weight:700;font-size:9px;letter-spacing:.04em';
              t2.textContent='ZALEGŁY';cell.appendChild(t2);
            }
          }
        }
        cell.addEventListener('click',()=>{if(absMode)togglePick(s);else pick(s);});
      }
      el.appendChild(cell);
    })(day);
  }
}
function pick(s){selDate=s;renderCal();renderDetail(s);}

/* ===================== DETAIL ===================== */
function renderDetail(s){
  const panel=document.getElementById('det');
  if(!isWork(s)){panel.innerHTML='<div class="det-empty">Ten dzień jest wolny od pracy.</div>';return;}
  if(s<getStart()){panel.innerHTML='<div class="det-empty">Ten dzień jest przed startem rotacji.</div>';return;}
  syncDay(s);
  const info=gDay(s),d=pd(s);
  const lbl=d.toLocaleDateString('pl-PL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let whoHtml='<span style="color:#A09C97;font-style:italic">Brak dostępnych lekarzy</span>';
  let typeBadge='';
  if(info&&info.who){
    const c=dcol(info.who);
    whoHtml=`<span style="font-weight:600;padding:3px 11px;border-radius:4px;background:${c.bg};color:${c.tx}">${info.who}</span>`;
    if(info.type==='makeup')typeBadge=' <span class="badge b-green">Zaległy dzień</span>';
  }
  let prRows='';
  docs.forEach(doc=>{
    const on=pres[s][doc]!==false,c=dcol(doc);
    const sid='pr_'+s.replace(/-/g,'')+'_'+doc.replace(/[^a-z0-9]/gi,'_');
    const sd=doc.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    prRows+=`<div class="pr-item"><div class="pr-av" style="background:${c.bg};color:${c.tx}">${ini(doc)}</div><span class="pr-nm">${doc}</span><button class="tog ${on?'on':''}" onclick="togP('${s}','${sd}',this,'${sid}')" aria-checked="${on}"></button><span id="${sid}" class="pr-st ${on?'ok':'no'}">${on?'Obecny':'Nieobecny'}</span></div>`;
  });
  panel.innerHTML=`<div class="det-date">${lbl.charAt(0).toUpperCase()+lbl.slice(1)}</div><div class="det-grid"><div><div class="det-row"><span class="det-lbl">Konsultuje</span><span style="font-size:13px">${whoHtml}${typeBadge}</span></div></div><div><div class="prs-lbl">Obecność lekarzy</div>${prRows}</div></div>`;
}
function togP(s,doc,btn,sid){
  syncDay(s);const cur=pres[s][doc]!==false;pres[s][doc]=!cur;
  btn.classList.toggle('on',!cur);btn.setAttribute('aria-checked',!cur);
  const lbl=document.getElementById(sid);
  if(lbl){lbl.textContent=!cur?'Obecny':'Nieobecny';lbl.className='pr-st '+(!cur?'ok':'no');}
  renderCal();renderDetail(s);
}

/* ===================== NAV ===================== */
function prevM(){vM--;if(vM<0){vM=11;vY--;}renderCal();}
function nextM(){vM++;if(vM>11){vM=0;vY++;}renderCal();}
function goToday(){vY=tod.getFullYear();vM=tod.getMonth();selDate=ds(tod);renderCal();renderDetail(selDate);}

/* ===================== PDF ===================== */
function genPDF(){
  if(!docs.length){alert('Dodaj lekarzy przed generowaniem PDF.');return;}
  if(!window.jspdf||!window.jspdf.jsPDF){alert('Biblioteka PDF jeszcze się ładuje, spróbuj za chwilę.');return;}
  const {jsPDF}=window.jspdf;
  const data=mData(vY,vM);
  const last=new Date(vY,vM+1,0).getDate();
  const st=getStart();
  const first_wd=new Date(vY,vM,1).getDay()==0?6:(new Date(vY,vM,1).getDay()-1);
  const rows=Math.ceil((first_wd+last)/7);
  const PW=841.89,PH=595.28; // A4 landscape pts
  const ML=28,MR=28,MB=20;
  const todS=ds(tod);
  const MNPL=['','Styczen','Luty','Marzec','Kwiecien','Maj','Czerwiec','Lipiec','Sierpien','Wrzesien','Pazdziernik','Listopad','Grudzien'];

  const doc=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});

  // Helpers
  const clr=(r,g,b)=>doc.setFillColor(r,g,b);
  const sclr=(r,g,b)=>doc.setDrawColor(r,g,b);
  const hx=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];}
  const rf=(x,y,w,h)=>doc.rect(x,PH-y-h,w,h,'F');
  const txt=(s,x,y,fn,sz,align='left')=>{
    doc.setFont('helvetica',fn);doc.setFontSize(sz);
    const safe=s.replace(/[^\x00-\x7E]/g,c=>({'Ą':'A','ą':'a','Ć':'C','ć':'c','Ę':'E','ę':'e','Ł':'L','ł':'l','Ń':'N','ń':'n','Ó':'O','ó':'o','Ś':'S','ś':'s','Ź':'Z','ź':'z','Ż':'Z','ż':'z'}[c]||'?'));
    if(align==='center')doc.text(safe,x,PH-y,{align:'center'});
    else if(align==='right')doc.text(safe,x,PH-y,{align:'right'});
    else doc.text(safe,x,PH-y);
  };

  // Header
  clr(24,95,165);rf(0,PH-44,PW,44);
  doc.setTextColor(255,255,255);
  txt('ODDZIAL KARDIOLOGII - GRAFIK KONSULTACJI',PW/2,PH-22,'bold',14,'center');
  txt(MNPL[vM+1].toUpperCase()+' '+vY,PW/2,PH-36,'normal',10,'center');

  // Legend
  const ly=PH-56;
  doc.setTextColor(68,68,65);
  txt('LEKARZE:',ML,ly,'bold',7);
  let lx=ML+44;
  docs.forEach((d,i)=>{
    const c=COLS[i%COLS.length];
    const[r,g,b]=hx(c.bg);clr(r,g,b);rf(lx,ly-12,72,17);
    const[tr,tg,tb]=c.pt;doc.setTextColor(tr,tg,tb);
    txt(d,lx+3,ly-2,'normal',6.5);lx+=76;
  });
  lx+=8;
  clr(234,243,222);rf(lx,ly-12,50,17);
  doc.setTextColor(59,109,17);txt('ZALEGLY',lx+3,ly-2,'bold',6.5);lx+=54;
  doc.setTextColor(68,68,65);txt('= zalegly dzien konsultacyjny',lx+3,ly-2,'normal',6.5);

  // Grid
  const gTop=PH-72,gBot=MB,gH=gTop-gBot;
  const dW=(PW-ML-MR)/7,hdrH=18,rH=(gH-hdrH)/rows;

  // Day headers
  clr(240,242,246);rf(ML,gTop,PW-ML-MR,hdrH);
  ['Pon','Wt','Sr','Czw','Pt','Sob','Nd'].forEach((n,i)=>{
    doc.setTextColor(80,90,110);
    txt(n,ML+i*dW+dW/2,gTop+hdrH-6,'bold',8,'center');
  });

  // Grid lines
  sclr(210,215,225);doc.setLineWidth(0.4);
  for(let r=0;r<=rows;r++){const y=PH-(gTop-hdrH-r*rH);doc.line(ML,y,PW-MR,y);}
  for(let col=0;col<=7;col++){const x=ML+col*dW;doc.line(x,PH-gTop,x,PH-gBot);}
  doc.line(ML,PH-gTop,PW-MR,PH-gTop);

  // Cells
  for(let day=1;day<=last;day++){
    const s=ds(new Date(vY,vM,day));
    const ci=first_wd+day-1,col=ci%7,row=Math.floor(ci/7);
    const cx=ML+col*dW,cy=gTop-hdrH-(row+1)*rH;
    const iswe=pd(s).getDay()===0||pd(s).getDay()===6;
    const ishol=hols.includes(s);

    if(iswe){clr(241,239,232);rf(cx,cy,dW,rH);}
    else if(ishol){clr(250,236,231);rf(cx,cy,dW,rH);}

    const isTod=(s===todS);
    if(isTod){clr(24,95,165);rf(cx+2,cy+rH-18,16,16);}

    if(isTod)doc.setTextColor(255,255,255);
    else if(iswe)doc.setTextColor(160,160,160);
    else if(ishol)doc.setTextColor(153,60,29);
    else doc.setTextColor(40,40,40);
    txt(String(day),cx+5,cy+rH-10,isTod?'bold':'normal',8);

    if(ishol){
      doc.setTextColor(153,60,29);
      txt('Dzien wolny',cx+dW/2,cy+rH/2+3,'italic',6,'center');
    }else if(!iswe){
      if(s>=st){
        const info=data[s];
        if(info&&info.who){
          const cc=dcol(info.who);
          const[r,g,b]=hx(cc.bg);
          const bx=cx+3,by=cy+rH*0.26,bw=dW-6,bh=14;
          clr(r,g,b);rf(bx,by,bw,bh);
          const[tr,tg,tb]=cc.pt;doc.setTextColor(tr,tg,tb);
          txt(info.who,bx+2,by+bh-4,'bold',6.5);
          if(info.type==='makeup'){
            clr(234,243,222);rf(bx,by+bh+2,bw,10);
            doc.setTextColor(59,109,17);
            txt('ZALEGLY',cx+dW/2,by+bh+10,'bold',5.5,'center');
          }
        }
      }
    }
  }

  // Border + footer
  sclr(180,190,210);doc.setLineWidth(0.8);
  doc.rect(ML,PH-gTop,PW-ML-MR,gH,'S');
  doc.setTextColor(150,155,165);doc.setFont('helvetica','normal');doc.setFontSize(6.5);
  doc.text('Oddzial Kardiologii',ML,PH-MB+8);
  doc.text('Wygenerowano: '+new Date().toLocaleDateString('pl-PL'),PW-MR,PH-MB+8,{align:'right'});

  doc.save('grafik-kardiologia-'+vY+'-'+String(vM+1).padStart(2,'0')+'.pdf');
}

/* ===================== INIT ===================== */
renderDocs();renderHols();renderCal();goToday();
</script>
</body>
</html>
